<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Itečka FOREVER! | Dark Mode</title>
    <style>
        /* Tmavá paleta príjemná pre oči */
        :root {
            --bg-color: #1a1c1e;    /* Hlboká tmavošedá */
            --card-bg: #25282c;     /* O niečo svetlejšia šedá pre karty */
            --text-main: #e2e8f0;   /* Jemná biela/strieborná */
            --text-muted: #94a3b8;  /* Tlmená modro-šedá */
            --accent-color: #818cf8; /* Jemná fialovo-modrá (nebije do očí) */
            --search-bg: #2d3139;
            --border-color: #334155;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            text-align: center; 
            margin: 0; 
            padding: 40px 20px; 
        }

        .container { max-width: 1100px; margin: 0 auto; }
        
        h1 { 
            font-weight: 300; 
            letter-spacing: 2px; 
            margin-bottom: 40px; 
            color: var(--accent-color);
        }

        /* Tmavé vyhľadávacie pole */
        #search {
            width: 100%;
            max-width: 450px;
            padding: 14px 25px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            font-size: 16px;
            background: var(--search-bg);
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }

        #search:focus { 
            border-color: var(--accent-color); 
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2); 
        }

        .student-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        /* Tmavá karta */
        .student-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .student-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent-color);
        }

        .student-photo {
            width: 110px;
            height: 110px;
            border-radius: 25px;
            object-fit: cover;
            margin-bottom: 18px;
            border: 3px solid var(--border-color);
        }

        .student-card h3 { 
            margin: 0 0 6px 0; 
            color: var(--text-main); 
        }

        .nickname { 
            color: var(--text-muted); 
            font-style: italic; 
            margin: 0 0 15px 0; 
        }

        .student-id { 
            background: rgba(129, 140, 248, 0.15); 
            color: var(--accent-color); 
            padding: 5px 14px; 
            border-radius: 8px; 
            font-size: 0.75rem; 
            font-weight: bold;
            border: 1px solid var(--accent-color);
        }
        
        #status { color: var(--text-muted); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Itečka FOREVER!</h1>
    
    <input type="text" id="search" placeholder="Hľadať v záznamoch..." onkeyup="filterData()">
    
    <div id="status"></div>
    <div id="student-container" class="student-list"></div>
</div>

<script>
    let studentsData = [];

    async function fetchData() {
        const statusDiv = document.getElementById('status');
        const container = document.getElementById('student-container');
        statusDiv.innerHTML = "Pripájanie k šifrovanému API...";

        try {
            const response = await fetch('http://127.0.0.1:5000/api');
            if (!response.ok) throw new Error('Chyba servera');
            
            const json = await response.json();
            studentsData = json.students;
            
            statusDiv.innerHTML = ''; 
            renderStudents(studentsData);
        } catch (err) {
            statusDiv.innerHTML = `<span style="color:#f87171">Chyba: Skontroluj, či ti v termináli beží Backend.py</span>`;
        }
    }

    function renderStudents(list) {
        const container = document.getElementById('student-container');
        container.innerHTML = '';
        
        list.forEach(s => {
            container.innerHTML += `
                <div class="student-card">
                    <img src="${s.image}" alt="${s.name}" class="student-photo">
                    <h3>${s.name} ${s.surname}</h3>
                    <p class="nickname">@${s.nickname}</p>
                    <span class="student-id">ID: ${s.id.toString().padStart(3, '0')}</span>
                </div>
            `;
        });
    }

    function filterData() {
        const val = document.getElementById('search').value.toLowerCase();
        const filtered = studentsData.filter(s => 
            s.name.toLowerCase().includes(val) || 
            s.surname.toLowerCase().includes(val) ||
            s.nickname.toLowerCase().includes(val)
        );
        renderStudents(filtered);
    }

    fetchData();
</script>

</body>
</html>

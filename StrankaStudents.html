<script>
    // 1. ADRESA - Pridal som /api priamo sem, aby si na to nemusel myslieť v kóde
    const URL = "https://peakbackend-2.onrender.com/api"; 
    let current = "";

    async function start() {
        try {
            // Tu to predtým padalo, lebo chýbalo /api
            const res = await fetch(URL); 
            if (!res.ok) throw new Error("Backend neodpovedá");
            
            const data = await res.json();
            const cont = document.getElementById('container');
            cont.innerHTML = ""; // Vyčistíme kontajner pre istotu

            data.students.forEach(s => {
                const d = document.createElement('div');
                d.className = 'card';
                d.innerHTML = `<img src="${s.image}"><h3>${s.name}</h3><p>@${s.nickname}</p>`;
                d.onclick = () => openChat(s.name);
                cont.appendChild(d);
            });
        } catch (err) {
            console.error("Chyba načítania:", err);
            document.getElementById('container').innerHTML = "<p>Nepodarilo sa načítať spolužiakov. Skontroluj, či ti beží Backend na Renderi.</p>";
        }
    }

    function openChat(name) {
        current = name;
        document.getElementById('chat-name').innerText = name;
        document.getElementById('msgs').innerHTML = `<div class="m ai">Čau, tu ${name}. Čo chceš?</div>`;
        document.getElementById('chat-modal').style.display = 'block';
    }

    function closeChat() { 
        document.getElementById('chat-modal').style.display = 'none'; 
    }

    async function send() {
        const inp = document.getElementById('inp');
        const txt = inp.value;
        if(!txt) return;
        
        const box = document.getElementById('msgs');
        box.innerHTML += `<div class="m user">${txt}</div>`;
        inp.value = "";
        box.scrollTop = box.scrollHeight;
        
        try {
            // Tu posielame správu na https://peakbackend-2.onrender.com/api/chat
            const res = await fetch(`${URL}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: current, message: txt})
            });
            
            const data = await res.json();
            box.innerHTML += `<div class="m ai">${data.reply}</div>`;
        } catch (err) {
            box.innerHTML += `<div class="m ai">Ešte stále som na tej hodine... (Chyba spojenia)</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    start();
</script>

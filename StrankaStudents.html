<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Itečka FOREVER! | Pastel Sunshine</title>
    <style>
        :root {
            --p-pink: #ffb7ce;
            --p-blue: #a2d2ff;
            --p-purple: #c8b6ff;
            --bg-gradient: linear-gradient(135deg, #ffb7ce 0%, #c8b6ff 50%, #a2d2ff 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #5e548e;
            --text-muted: #9f86c0;
            --accent-color: #ff85a2;
            --border-color: rgba(255, 255, 255, 0.5);
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-main);
            text-align: center; 
            margin: 0; 
            padding: 40px 20px; 
            position: relative;
            min-height: 100vh;
        }

        /* Gradientné bodky v pozadí */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.3) 2px, transparent 2px);
            background-size: 25px 25px;
            z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; position: relative; }
        
        h1 { 
            font-weight: 300; 
            letter-spacing: 2px; 
            margin-bottom: 40px; 
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        #search {
            width: 100%;
            max-width: 450px;
            padding: 14px 25px;
            margin-bottom: 40px;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-size: 16px;
            background: white;
            color: var(--text-main);
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        #search:focus { 
            border-color: var(--p-purple); 
            box-shadow: 0 0 15px rgba(200, 182, 255, 0.5); 
        }

        .student-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .student-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 15px; /* Kockovejší tvar */
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .student-card:hover { 
            transform: translateY(-5px); 
            background: white;
        }

        /* KOCKATÉ FOTKY */
        .student-photo {
            width: 110px;
            height: 110px;
            border-radius: 10px; /* Len jemné zaoblenie pre moderný look */
            object-fit: cover;
            margin-bottom: 18px;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .student-card h3 { margin: 0 0 6px 0; }

        .nickname { 
            color: var(--text-muted); 
            font-style: italic; 
            margin: 0 0 15px 0; 
        }

        .student-id { 
            background: linear-gradient(to right, #ffe0ac, #ffb7ce);
            color: #5e548e; 
            padding: 5px 14px; 
            border-radius: 8px; 
            font-size: 0.75rem; 
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.8);
        }
        
        #status { color: white; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Itečka FOREVER!</h1>
    
    <input type="text" id="search" placeholder="Hľadať v záznamoch..." onkeyup="filterData()">
    
    <div id="status"></div>
    <div id="student-container" class="student-list"></div>
</div>

<script>
    let studentsData = [];

    async function fetchData() {
        const statusDiv = document.getElementById('status');
        const container = document.getElementById('student-container');
        statusDiv.innerHTML = "Pripájanie k šifrovanému API... ✨";

        try {
            const response = await fetch('https://peakbackend.onrender.com/api');
            if (!response.ok) throw new Error('Chyba servera');
            
            const json = await response.json();
            studentsData = json.students;
            
            statusDiv.innerHTML = ''; 
            renderStudents(studentsData);
        } catch (err) {
            statusDiv.innerHTML = `<span style="color:#ffffff; background: rgba(255,0,0,0.3); padding: 5px 10px; border-radius: 5px;">Chyba: Skontroluj, či ti v termináli beží Backend.py</span>`;
        }
    }

    function renderStudents(list) {
        const container = document.getElementById('student-container');
        container.innerHTML = '';
        
        list.forEach(s => {
            container.innerHTML += `
                <div class="student-card">
                    <img src="${s.image}" alt="${s.name}" class="student-photo">
                    <h3>${s.name} ${s.surname}</h3>
                    <p class="nickname">@${s.nickname}</p>
                    <span class="student-id">ID: ${s.id.toString().padStart(3, '0')}</span>
                </div>
            `;
        });
    }

    function filterData() {
        const val = document.getElementById('search').value.toLowerCase();
        const filtered = studentsData.filter(s => 
            s.name.toLowerCase().includes(val) || 
            s.surname.toLowerCase().includes(val) ||
            s.nickname.toLowerCase().includes(val)
        );
        renderStudents(filtered);
    }

    fetchData();
</script>

</body>
</html>

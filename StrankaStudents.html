<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>✨ Itečka PRINCESS Edition ✨</title>
    <style>
        /* Barbie & Femboy pastelová paleta */
        :root {
            --bg-color: #fff0f6;    /* Jemnučká pastelová ružová */
            --card-bg: #ffffff;     /* Čistá biela pre karty */
            --text-main: #d63384;   /* Sýtejšia Barbie ružová pre text */
            --text-muted: #f78fb3;  /* Svetlejšia ružová pre detaily */
            --accent-color: #ff85a2; /* Hlavná ružová (žiarivá) */
            --search-bg: #ffffff;
            --border-color: #ffdeeb;
            --gradient: linear-gradient(135deg, #ff85a2 0%, #f78fb3 100%);
        }

        body { 
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            text-align: center; 
            margin: 0; 
            padding: 40px 20px; 
            background-image: radial-gradient(#ffdeeb 2px, transparent 2px);
            background-size: 30px 30px; /* Bodkované pozadie */
        }

        .container { max-width: 1100px; margin: 0 auto; }
        
        h1 { 
            font-weight: bold; 
            letter-spacing: 1px; 
            margin-bottom: 40px; 
            color: #d63384;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(255, 133, 162, 0.3);
            font-size: 3rem;
        }

        /* Ružové vyhľadávacie pole */
        #search {
            width: 100%;
            max-width: 450px;
            padding: 15px 25px;
            margin-bottom: 40px;
            border: 3px solid var(--border-color);
            border-radius: 30px; /* Extra zaoblené */
            font-size: 16px;
            background: var(--search-bg);
            color: #d63384;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.1);
        }

        #search:focus { 
            border-color: var(--accent-color); 
            box-shadow: 0 0 15px rgba(255, 133, 162, 0.4); 
        }

        .student-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        /* Soft Barbie karta */
        .student-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 30px; /* Veľmi oblé rohy */
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Pridá srdiečko pri hoveri (metaforicky) */
        .student-card:hover { 
            transform: scale(1.05); 
            border-color: var(--accent-color);
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.3);
        }

        .student-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Okrúhle fotky */
            object-fit: cover;
            margin-bottom: 18px;
            border: 4px solid var(--accent-color);
            padding: 5px;
            background: white;
        }

        .student-card h3 { 
            margin: 0 0 6px 0; 
            color: #d63384; 
        }

        .nickname { 
            color: var(--text-muted); 
            font-style: italic; 
            margin: 0 0 15px 0;
            font-size: 0.9rem;
        }

        .student-id { 
            background: var(--gradient); 
            color: white; 
            padding: 6px 18px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
            border: none;
        }
        
        #status { color: #f78fb3; margin-bottom: 20px; font-weight: bold; }

        /* Scrollbar v Barbie štýle */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #fff0f6; }
        ::-webkit-scrollbar-thumb { background: #ff85a2; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Itečka PRINCESS ✨</h1>
    
    <input type="text" id="search" placeholder="Hľadať cuties..." onkeyup="filterData()">
    
    <div id="status"></div>
    <div id="student-container" class="student-list"></div>
</div>

<script>
    let studentsData = [];

    async function fetchData() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = "Načítavam zoznam kamošov... ✨";

        try {
            const response = await fetch('https://peakbackend.onrender.com/api');
            if (!response.ok) throw new Error('Chybička se vloudila');
            
            const json = await response.json();
            studentsData = json.students;
            
            statusDiv.innerHTML = ''; 
            renderStudents(studentsData);
        } catch (err) {
            statusDiv.innerHTML = `<span style="color:#ff4d4d">Upsie! Skontroluj Backend.py, zlatko! 🎀</span>`;
        }
    }

    function renderStudents(list) {
        const container = document.getElementById('student-container');
        container.innerHTML = '';
        
        list.forEach(s => {
            container.innerHTML += `
                <div class="student-card">
                    <img src="${s.image}" alt="${s.name}" class="student-photo">
                    <h3>${s.name} ${s.surname}</h3>
                    <p class="nickname">✨ @${s.nickname} ✨</p>
                    <span class="student-id">ID: ${s.id.toString().padStart(3, '0')}</span>
                </div>
            `;
        });
    }

    function filterData() {
        const val = document.getElementById('search').value.toLowerCase();
        const filtered = studentsData.filter(s => 
            s.name.toLowerCase().includes(val) || 
            s.surname.toLowerCase().includes(val) ||
            s.nickname.toLowerCase().includes(val)
        );
        renderStudents(filtered);
    }

    fetchData();
</script>

</body>
</html>
